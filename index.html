<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Soundboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Auth Section -->
    <div id="auth-section" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Login Soundboard</h3>
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div id="auth-error" class="alert alert-danger d-none" role="alert"></div>
                            <div class="d-grid gap-2">
                                <button type="submit" id="btn-login" class="btn btn-primary">Login</button>
                                <button type="button" id="btn-register" class="btn btn-outline-secondary">Daftar Akun Baru</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content (Hidden until login) -->
    <div id="main-content" class="container mt-4 d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>My Soundboard</h2>
            <div>
                <span id="user-display" class="me-3 text-muted"></span>
                <button id="btn-logout" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
        </div>

        <div class="mb-4 d-flex gap-2">
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addSoundModal">
                + Tambah Sound
            </button>
            <button id="btn-toggle-edit" class="btn btn-outline-primary">
                ✏️ Mode Edit
            </button>
        </div>

        <div id="soundboard-grid" class="row g-3">
            <!-- Loading indicator -->
            <div id="loading-spinner" class="text-center mt-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2 text-muted">Memuat soundboard...</p>
            </div>
            <!-- Sounds will be injected here -->
        </div>
    </div>

    <!-- Modal Add Sound -->
    <div class="modal fade" id="addSoundModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tambah Sound Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="add-sound-form">
                        <div class="mb-3">
                            <label for="sound-name" class="form-label">Nama Sound</label>
                            <input type="text" class="form-control" id="sound-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="sound-url" class="form-label">URL Audio atau Link YouTube</label>
                            <input type="url" class="form-control" id="sound-url" placeholder="https://youtube.com/watch?v=... atau https://site.com/audio.mp3" required>
                            <div class="form-text">Mendukung direct link (.mp3) dan link YouTube.</div>
                        </div>
                        <button type="submit" class="btn btn-primary">Simpan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Edit Sound -->
    <div class="modal fade" id="editSoundModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Sound</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-sound-form">
                        <input type="hidden" id="edit-sound-id">
                        <div class="mb-3">
                            <label for="edit-sound-name" class="form-label">Nama Sound</label>
                            <input type="text" class="form-control" id="edit-sound-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-sound-url" class="form-label">URL Audio atau Link YouTube</label>
                            <input type="url" class="form-control" id="edit-sound-url" required>
                        </div>
                        <div class="d-flex justify-content-between">
                            <button type="button" id="btn-delete-sound" class="btn btn-danger">Hapus Sound</button>
                            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube Hidden Player -->
    <div id="youtube-player-container" style="position: absolute; top: -9999px; left: -9999px;">
        <div id="yt-player"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="app.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
